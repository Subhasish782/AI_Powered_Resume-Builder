<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Document body -->
  <rect x="8" y="7" width="13" height="17" rx="2" fill="white" opacity="0.95"/>

  <!-- Document fold corner -->
  <path d="M17 7 L21 11 L17 11 Z" fill="#93c5fd"/>
  <path d="M17 7 L21 11 L17 11 Z" fill="white" opacity="0.4"/>
  <rect x="17" y="7" width="4" height="4" rx="0" fill="none"/>
  <path d="M17 7 L17 11 L21 11" fill="#bfdbfe" opacity="0.6"/>

  <!-- Document lines (resume text) -->
  <rect x="10" y="13" width="6" height="1.5" rx="0.75" fill="#1d4ed8" opacity="0.5"/>
  <rect x="10" y="16" width="9" height="1.5" rx="0.75" fill="#1d4ed8" opacity="0.35"/>
  <rect x="10" y="19" width="7" height="1.5" rx="0.75" fill="#1d4ed8" opacity="0.35"/>

  <!-- Green checkmark circle (bottom-right badge) -->
  <circle cx="22" cy="22" r="7" fill="#10b981"/>
  <circle cx="22" cy="22" r="6" fill="#059669"/>
  <path d="M19 22 L21.2 24.2 L25 20" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
  </defs>
</svg>
